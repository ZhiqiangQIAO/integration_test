# ============================================================
# 业务流程测试 — 多环境配置文件
# 说明：支持 DEV / ST / UAT 多套环境，通过 --env 参数切换。
#      用法：/biz-test <场景> --env st
#      不指定 --env 时使用 default 环境。
# ============================================================

# ---- 默认环境 ----
default: dev

# ---- 环境列表 ----
environments:
  # ============ 开发环境 ============
  dev:
    base_url: https://dev-api.example.com
    auth:
      type: bearer
      token: ${DEV_TOKEN}
      refresh:
        enabled: true
        method: POST
        path: /api/auth/refresh
        body: |
          {"refreshToken": "{{loginStep.token}}"}
        token_field: $.data.token
    http:
      timeout: 30000
      retry:
        max: 0
        interval: 1000

  # ============ 测试环境 ============
  st:
    base_url: https://st-api.example.com
    auth:
      type: bearer
      token: ${ST_TOKEN}
      refresh:
        enabled: true
        method: POST
        path: /api/auth/refresh
        body: |
          {"refreshToken": "{{loginStep.token}}"}
        token_field: $.data.token
    http:
      timeout: 30000
      retry:
        max: 1
        interval: 2000

  # ============ 验证环境 ============
  uat:
    base_url: https://uat-api.example.com
    auth:
      type: bearer
      token: ${UAT_TOKEN}
      refresh:
        enabled: false
    http:
      timeout: 60000
      retry:
        max: 0
        interval: 1000

  # ============ GitHub API（公开接口示例）============
  github:
    base_url: https://api.github.com
    auth:
      type: bearer
      token: ${GITHUB_TOKEN}
      refresh:
        enabled: false
    http:
      timeout: 30000
      retry:
        max: 0
        interval: 1000

# ---- 权限异常交互模板（所有环境共用）----
permission:
  prompt_template: |
    步骤 "{step_desc}" 返回了 {status_code}（{reason}）。
    可能原因：Token 过期、权限不足、IP 白名单限制、账号被锁定...
    请输入你的操作：
    [1] 输入新的认证信息（Token/Cookie/账号密码）
    [2] 跳过此步骤，标记为未执行
    [3] 终止整个流程
